name: release-blockchains

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'

jobs:
  chia:
    runs-on: ubuntu-24.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: docker/dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          build-args: |
            "UBUNTU_VER=noble"
            "MACHINARIS_STREAM=latest"
            "CHIA_BRANCH=2.7.0"
            "BLADEBIT_BRANCH=master"
            "MADMAX_BRANCH=master"
          tags: |
            ghcr.io/${{ github.repository_owner }}/machinaris:latest
            ghcr.io/${{ github.repository_owner }}/machinaris:v${{ github.event.inputs.version }}
